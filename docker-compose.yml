version: "3.9"

services:
  api:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - ddi_rag/.env
    environment:
      - DDI_CHROMA_DIR=/app/chroma_ddi_db
      - DDI_DATA_CSV=/app/data/clean_ddi_dataset.csv
    volumes:
      - ./ddi_rag/data:/app/data:ro
      - chroma_data:/app/chroma_ddi_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ddi_rag
      POSTGRES_USER: ddi_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddi_user -d ddi_rag"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  chroma_data:
